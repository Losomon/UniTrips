<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniTrips — University Trip Management Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- ════════════════ LOGIN ════════════════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-mark">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M2 12l10 5 10-5" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M2 17l10 5 10-5" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </div>
      <h1>UniTrips</h1>
      <p>University Trip &amp; Events Management Portal</p>
    </div>
    <div class="role-cards">
      <div class="role-card selected" onclick="selectRole('admin')" id="role-admin">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24"><path d="M12 1l3 6.5L22 8.5l-5 4.8 1.2 6.7L12 17l-6.2 3 1.2-6.7L2 8.5l7-.999L12 1z" stroke="#8b5cf6" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <div class="role-name">Admin</div>
        <div class="role-desc">Manage trips &amp; approvals</div>
      </div>
      <div class="role-card" onclick="selectRole('student')" id="role-student">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z" stroke="#10b981" stroke-width="1.6" stroke-linejoin="round"/><path d="M6 12v5c0 1.657 2.686 3 6 3s6-1.343 6-3v-5" stroke="#10b981" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <div class="role-name">Student</div>
        <div class="role-desc">Browse &amp; apply for trips</div>
      </div>
    </div>
    <div class="fg">
      <label>Username / Student ID</label>
      <input type="text" id="login-user" placeholder="e.g. admin or ENG001" value="admin">
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" value="admin123">
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In to Portal</button>
    <div class="demo-hint">
      Admin: admin / admin123 &nbsp;|&nbsp; Student: <span onclick="fillStudent()">ENG001 / student123</span>
    </div>
  </div>
</div>

<!-- ════════════════ APP SHELL ════════════════ -->
<div id="app-shell">
  <div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="mark">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linejoin="round"/></svg>
          </div>
          <div><div class="brand">UniTrips</div><div class="ver">Portal v2.0</div></div>
        </div>
      </div>
      <div class="sidebar-user">
        <div class="avatar" id="sb-avatar"></div>
        <div><div class="user-name" id="sb-name"></div><div class="user-role" id="sb-role"></div></div>
      </div>
      <div id="sidebar-nav"></div>
      <div class="sidebar-footer">
        <div class="logout-btn" onclick="doLogout()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Sign Out
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main-content">
      <!-- panels injected here -->
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="maybeClose(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- TOAST -->
<div class="toast-stack" id="toasts"></div>

<script src="js/index.js"></script>
</body>
</html>
